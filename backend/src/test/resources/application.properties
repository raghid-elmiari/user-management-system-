# H2 Database — test-only profile (src/test/resources, never loaded by the running app)
spring.datasource.url=jdbc:h2:mem:rbac_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.flyway.enabled=false

logging.level.org.springframework.security=DEBUG

jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000
jwt.refresh-token.expiration=604800000

server.port=8080

# Redis settings (point at the same local instance used for dev; tests that
# don't touch caching never connect, since RedisConfig only opens a
# connection lazily on first cache access)
redis.host=localhost
redis.port=6379
redis.password=
